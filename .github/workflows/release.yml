name: Release

# Пуш тега вида X.Y.Z (без 'v') -> GitHub Release без файлов (exe собирает юзер: Actions -> Build executable).
# Релиз нужен для апдейт-баннера установщика (UpdateChecker читает tag_name из releases/latest).
# Тело релиза = секция тега из CHANGELOG.md (нет секции -> список коммитов) + .github/release-body.md.
on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # нужна история: фолбэк на список коммитов между тегами

      - name: Build release notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Секция «## <тег>» из CHANGELOG.md до следующего «## ».
          notes=$(awk -v want="## $TAG" '$0 == want {on=1; next} /^## /{on=0} on' CHANGELOG.md || true)

          if [ -z "$(printf '%s' "$notes" | tr -d '[:space:]')" ]; then
            # Секции нет - не выпускаем пустой релиз: показываем коммиты с прошлого тега.
            prev=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || true)
            range="$TAG"
            [ -n "$prev" ] && range="$prev..$TAG"
            notes=$(git log --no-merges --pretty='- %s' "$range")
            echo "CHANGELOG.md: секции '## $TAG' нет - беру коммиты ($range)"
          fi

          {
            echo "## Что нового в $TAG"
            echo
            printf '%s\n' "$notes"
            echo
            cat .github/release-body.md
          } > release-notes.md
          cat release-notes.md

      - name: Create GitHub Release (no binaries)
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
