name: Build executable

# Ручной запуск: Actions -> Build executable -> Run workflow
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish single-file exe
        shell: pwsh
        run: ./WAND_RU/build.ps1 -Publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WandRuInstaller
          path: WAND_RU/publish/WandRuInstaller.exe
          if-no-files-found: error
